<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Kilo Takip</title>
<meta name="description" content="Günlük kilo takibi">

<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#2E8B62">
<meta name="color-scheme" content="light">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Kilo Takip">
<link rel="apple-touch-icon" href="./icons/apple-touch-icon.png">
<link rel="icon" href="./icons/icon-192.png" sizes="192x192">
<link rel="icon" href="./icons/icon-512.png" sizes="512x512">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./styles.css">
</head>
<body>
<div class="app">
  <div class="app-header">
    <div class="app-date" id="dateText"></div>
    <button type="button" class="app-goal" id="goalHeader"></button>
  </div>

  <div class="weight-card">
    <div class="weight-card-label">Güncel kilon</div>
    <div class="weight-value">
      <div class="num" id="weightNum"></div>
      <div class="unit">kg</div>
    </div>
    <div class="weight-subline" id="subline"></div>
    <button class="btn-primary" id="openUpdateBtn">Güncelle</button>
  </div>

  <div class="chart-card">
    <div class="chart-title">Son 30 gün</div>
    <svg id="chartSvg" width="342" height="176" viewBox="0 0 342 176">
      <line id="goalLine" x1="0" x2="342" stroke="#2E8B62" stroke-width="1" stroke-dasharray="2 5" opacity="0.6"></line>
      <path id="areaPath" fill="#2E8B62" opacity="0.1"></path>
      <path id="linePath" fill="none" stroke="#2E8B62" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"></path>
      <g id="noteDots"></g>
      <circle id="lastPoint" r="5" fill="#2E8B62" stroke="#fff" stroke-width="2"></circle>
      <text id="startLabel" x="2" y="173" font-size="10" fill="#9BB3A5" font-family="Manrope" font-weight="700"></text>
      <text x="340" y="173" text-anchor="end" font-size="10" fill="#9BB3A5" font-family="Manrope" font-weight="700">Bugün</text>
    </svg>
  </div>

  <div class="popup-overlay" id="popupOverlay" hidden>
    <div class="popup-sheet">
      <div class="popup-sheet-header">
        <div class="popup-sheet-title">Kiloyu güncelle</div>
        <button class="popup-close" id="closePopupBtn">✕</button>
      </div>
      <div class="weight-stepper">
        <button data-adjust="-1">−1</button>
        <button class="small" data-adjust="-0.1">−0,1</button>
        <div class="weight-draft" id="draftWeight"></div>
        <button class="small" data-adjust="0.1">+0,1</button>
        <button data-adjust="1">+1</button>
      </div>
      <div id="chipGroups"></div>
      <button class="btn-primary" id="savePopupBtn">Kaydet</button>
    </div>
  </div>

  <div class="popup-overlay" id="goalPopupOverlay" hidden>
    <div class="popup-sheet">
      <div class="popup-sheet-header">
        <div class="popup-sheet-title">Hedef kiloyu güncelle</div>
        <button class="popup-close" id="closeGoalPopupBtn">✕</button>
      </div>
      <div class="weight-stepper">
        <button data-goal-adjust="-1">−1</button>
        <button class="small" data-goal-adjust="-0.1">−0,1</button>
        <div class="weight-draft" id="goalDraftWeight"></div>
        <button class="small" data-goal-adjust="0.1">+0,1</button>
        <button data-goal-adjust="1">+1</button>
      </div>
      <button class="btn-primary" id="saveGoalBtn">Kaydet</button>
    </div>
  </div>
</div>

<script src="./app.js"></script>
</body>
</html>
